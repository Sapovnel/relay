server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Static assets — let the browser cache them aggressively.
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }

  # Proxy same-origin API + WebSocket to the collab server. Same-origin is
  # load-bearing for the httpOnly session cookie to reach the backend.
  location /auth/ {
    proxy_pass         http://server:4000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Request-ID $request_id;
  }
  location /rooms/ {
    proxy_pass         http://server:4000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Request-ID $request_id;
    # /run streams NDJSON for a long time — don't let nginx buffer it.
    proxy_buffering    off;
  }
  location /ws/ {
    proxy_pass         http://server:4000/;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_read_timeout 3600s;
  }

  # SPA fallback — React Router handles the actual routing client-side.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
